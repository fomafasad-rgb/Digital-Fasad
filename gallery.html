<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея робіт | DigitalBud</title>
    <meta name="robots" content="index, follow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --gray: #888888;
        }

        /* Кастомний скроллбар */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Згладжування шрифтів для чіткості */
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale; 
        }

        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; color: var(--primary); text-transform: uppercase; text-decoration: none; font-size: 1.2rem; letter-spacing: 1px; transition: opacity 0.3s; }
        .logo:hover { opacity: 0.8; }
        .back-link { color: var(--text); text-decoration: none; font-size: 0.9rem; border: 1px solid var(--primary); padding: 5px 15px; border-radius: 4px; transition: 0.3s; }
        .back-link:hover { background: var(--primary); color: #000; }

        section { padding: 60px 20px; max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 2.5rem; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; text-align: center; line-height: 1.1; }
        .section-desc { text-align: center; color: var(--gray); font-size: 1.1rem; margin-bottom: 50px; max-width: 600px; margin-left: auto; margin-right: auto; }

        /* СІТКА ГАЛЕРЕЇ */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
